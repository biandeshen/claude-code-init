name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  node-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: ['18', '20', '22']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: node --check index.js
      - run: node -e "const pkg = require('./package.json'); if (!pkg.name || !pkg.version) process.exit(1)"
      - run: npm test
      - run: npm audit --audit-level=moderate

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - run: sudo apt-get update -qq && sudo apt-get install -qq shellcheck
      - run: |
          echo "::group::init.sh"
          shellcheck -x init.sh
          echo "::endgroup::"
          echo "::group::scripts/*.sh"
          find scripts -name "*.sh" -exec shellcheck -x {} +
          echo "::endgroup::"

  bash-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - run: |
          for f in init.sh scripts/*.sh; do
            [ -f "$f" ] || continue
            echo "Checking $f..."
            bash -n "$f" || { echo "FAIL: $f"; exit 1; }
          done
          echo "All Bash scripts syntax OK"

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: DavidAnson/markdownlint-cli2-action@db43aefc7bc5c56b8068f99235cb088f36cfa269
        with:
          globs: 'templates/*.md,docs/*.md,*.md'

  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@3c2dbd4fe58be2262966472148d6609918a8e3ae
        with:
          python-version: '3.9'
      - run: |
          python -m py_compile scripts/check_secrets.py
          python -m py_compile scripts/check_project_structure.py
          python -m py_compile scripts/check_dependencies.py
          python -m py_compile scripts/check_function_length.py
          python -m py_compile scripts/check_import_order.py
          python -m py_compile .claude/scripts/check_docs_consistency.py

  docs-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@3c2dbd4fe58be2262966472148d6609918a8e3ae
        with:
          python-version: '3.9'
      - run: python .claude/scripts/check_docs_consistency.py

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@44bdecdef787b7ab0441bf2d8a9e4cd3ea8052f3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check version consistency
        run: |
          PKG_VER=$(node -e "console.log(require('./package.json').version)")
          echo "package.json:  v$PKG_VER"
          INIT_SH_VER=$(grep -oP '版本:\s*v\K[\d.]+' init.sh | head -1)
          echo "init.sh:       v$INIT_SH_VER"
          INIT_PS1_VER=$(grep -oP '版本:\s*v\K[\d.]+' init.ps1 | head -1)
          echo "init.ps1:      v$INIT_PS1_VER"
          CLAUDE_VER=$(grep -oP '> 版本：v\K[\d.]+' CLAUDE.md)
          echo "CLAUDE.md:     v$CLAUDE_VER"
          [ "$PKG_VER" = "$INIT_SH_VER" ] || { echo "MISMATCH: init.sh ($INIT_SH_VER) != package.json ($PKG_VER)"; exit 1; }
          [ "$PKG_VER" = "$INIT_PS1_VER" ] || { echo "MISMATCH: init.ps1 ($INIT_PS1_VER) != package.json ($PKG_VER)"; exit 1; }
          [ "$PKG_VER" = "$CLAUDE_VER" ] || { echo "MISMATCH: CLAUDE.md ($CLAUDE_VER) != package.json ($PKG_VER)"; exit 1; }
          echo "✅ All version references consistent: v$PKG_VER"
