version: 2
updates:
  # npm 依赖
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    assignees:
      - "biandeshen"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5

  # pip 依赖（Python 校验脚本）
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    assignees:
      - "biandeshen"
    labels:
      - "dependencies"
    open-pull-requests-limit: 3

  # GitHub Actions（按 commit hash 锁定版本，Dependabot 会自动更新）
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    assignees:
      - "biandeshen"
    labels:
      - "dependencies"
      - "ci"
    open-pull-requests-limit: 3
